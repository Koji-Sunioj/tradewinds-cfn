Parameters:
  DBAdmin:
    Description: parameters of admin user
    Type: String
  DBAnalyst:
    Description: parameters of read only analyst user
    Type: String
  FunctionVersion:
    Description: version of function zip in s3
    Type: String
  FunctionBucket:
    Description: bucket name of where functions zip lives
    Type: String

Resources:
  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: CloudFront-Access
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
  ETLBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-${AWS::Region}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
            AllowedOrigins:
              - "*"
            MaxAge: 3600
      PublicAccessBlockConfiguration:
        BlockPublicPolicy: false
  ETLBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ETLBucket
      PolicyDocument: 
        Version: "2012-10-17"
        Statement: 
          - Action: s3:GetObject
            Effect: "Allow"
            Principal: '*'
            Resource: !Sub "arn:aws:s3:::${AWS::StackName}-${AWS::Region}/app_data/*"
          - Action: s3:GetObject
            Principal:
              Service: "cloudfront.amazonaws.com"
            Effect: Allow
            Resource: !Sub "arn:aws:s3:::${AWS::StackName}-${AWS::Region}/front_end/*"
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !GetAtt ETLBucket.RegionalDomainName
            Id: WebAppBuckPointer
            OriginAccessControlId: !Ref CloudFrontOriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultRootObject: front_end/index.html
        Enabled: true
        DefaultCacheBehavior:
          TargetOriginId: WebAppBuckPointer
          ViewerProtocolPolicy: allow-all
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
  LambdaLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      CompatibleRuntimes:
        - python3.10
      Content:
        S3Bucket: !Ref FunctionBucket
        S3Key: lambda_layer.zip
  LoadSalesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service:
                - "lambda.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
  ETLRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service:
                - "glue.amazonaws.com"
            Action:
              - "sts:AssumeRole"
      Policies:
        - PolicyName: etl-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: "Allow"
                Action: "s3:GetObject"
                Resource: !GetAtt ETLBucket.Arn
              - Effect: "Allow"
                Action: "s3:PutObject"
                Resource: !Sub "arn:aws:s3:::${AWS::StackName}-${AWS::Region}/*" 
              - Effect: "Allow"
                Action: "s3:ListBucket"
                Resource: !GetAtt ETLBucket.Arn
              - Effect: "Allow"
                Action: "logs:*"
                Resource: "arn:aws:logs:*:*:*"
  ETLJob:
    Type: AWS::Glue::Job
    Properties:
      Command:
        Name: glueetl
        ScriptLocation: !Sub "s3://${FunctionBucket}/etl.py"
      DefaultArguments: 
        "--db_analyst": !Ref DBAnalyst
        "--etl_bucket": !Ref ETLBucket
      ExecutionClass: FLEX 
      GlueVersion: "4.0"
      MaxRetries: 0 
      NumberOfWorkers: 2 
      Role: !GetAtt ETLRole.Arn
      WorkerType: G.1X
  LoadSalesFunction:
    Type: AWS::Lambda::Function
    Properties:
      Handler: load_sales.handler
      Role: !GetAtt LoadSalesRole.Arn
      Environment:
        Variables:
          DB_ADMIN: !Ref DBAdmin
      Code:
        S3Bucket: !Ref FunctionBucket
        S3Key: tradewind_functions.zip
        S3ObjectVersion: !Ref FunctionVersion
      Runtime: python3.10
      Timeout: 60
      Layers:
        - !Ref LambdaLayer
  LoadSalesLog:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${LoadSalesFunction}"
      RetentionInDays: 5
  LoadSalesRule:
    Type: AWS::Events::Rule
    Properties:
      ScheduleExpression: cron(0 12 * * ? *)
      State: ENABLED
      Targets:
        - Arn: !GetAtt LoadSalesFunction.Arn
          Id: Target0
  LoadEventPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt LoadSalesFunction.Arn
      Principal: events.amazonaws.com
      SourceArn: !GetAtt LoadSalesRule.Arn
  ETLScheduleTrigger:
    Type: AWS::Glue::Trigger
    Properties:
      Actions: 
        - JobName: !Ref ETLJob 
          Timeout: 10
      Schedule: cron(0 18 ? * SUN *)
      StartOnCreation: true 
      Type: "SCHEDULED"
